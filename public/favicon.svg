<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#44403c"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <!-- outer glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- outer ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <!-- dark fill -->
  <circle cx="32" cy="32" r="22" fill="url(#bg)"/>
  <!-- inner decorative ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#78716c" stroke-width="1" opacity="0.5"/>
  <!-- center notable pip -->
  <circle cx="32" cy="32" r="8" fill="#d97706"/>
  <circle cx="32" cy="32" r="5" fill="#fbbf24"/>
  <circle cx="32" cy="30" r="2.5" fill="#fef3c7" opacity="0.7"/>
</svg>
